<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Redesign / Dark Tech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #090b10;
        --panel: #10141c;
        --panel-soft: #0d1118;
        --text: #f5f7fb;
        --muted: #a1aabc;
        --soft: #677086;
        --line: rgba(128, 154, 201, 0.18);
        --accent: #7c8cff;
        --accent-2: #31c6a1;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background:
        radial-gradient(circle at top right, rgba(124, 140, 255, 0.12), transparent 26%),
        radial-gradient(circle at bottom left, rgba(49, 198, 161, 0.08), transparent 22%),
        var(--bg); color: var(--text); font-family: "Inter", "Noto Sans SC", sans-serif; }
      .shell { width: min(1240px, calc(100% - 48px)); margin: 0 auto; padding: 24px 0 48px; }
      .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 22px; }
      .brand,.nav a,.eyebrow,.meta,.terminal-line { font-family: "JetBrains Mono", monospace; }
      .brand { font-size: 16px; font-weight: 800; }
      .nav { display: flex; gap: 20px; }
      .nav a { color: var(--muted); font-size: 12px; font-weight: 800; text-decoration: none; text-transform: uppercase; }
      .hero { display: grid; grid-template-columns: minmax(0, 1fr) 500px; gap: 30px; align-items: stretch; }
      .copy,.visual { padding: 32px; border: 1px solid var(--line); background: linear-gradient(180deg, rgba(16,20,28,0.92), rgba(13,17,24,0.92)); }
      .eyebrow { color: var(--accent-2); font-size: 12px; font-weight: 800; text-transform: uppercase; }
      h1 { margin: 20px 0 0; font-size: clamp(46px, 5vw, 76px); line-height: 0.98; letter-spacing: 0; }
      h1 strong { color: var(--accent); }
      .intro { margin: 22px 0 0; color: var(--muted); font-size: 18px; line-height: 1.8; }
      .meta { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 24px; color: var(--soft); font-size: 11px; text-transform: uppercase; }
      .actions { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
      .actions a { display: inline-flex; min-height: 46px; align-items: center; padding: 0 18px; text-decoration: none; }
      .actions a:first-child { background: var(--accent); color: #fff; }
      .actions a:not(:first-child) { border: 1px solid var(--line); color: var(--text); }
      .terminal { display: grid; gap: 12px; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--line); }
      .terminal-line { color: var(--soft); font-size: 12px; }
      .visual img { display: block; width: 100%; aspect-ratio: 4 / 5; object-fit: cover; margin-top: 18px; }
      .visual-note { display: flex; justify-content: space-between; margin-top: 14px; color: var(--soft); font-size: 11px; text-transform: uppercase; }
      @media (max-width: 1100px) { .hero { grid-template-columns: 1fr; } }
      @media (max-width: 720px) {
        .shell { width: min(100% - 24px, 1240px); }
        .copy,.visual { padding: 20px; }
        h1 { font-size: 38px; }
        .intro { font-size: 16px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">XUXU BLOG</div>
        <nav class="nav">
          <a href="#">首页</a><a href="#">归档</a><a href="#">分类</a><a href="#">标签</a><a href="#">关于</a>
        </nav>
      </header>
      <main class="hero">
        <section class="copy">
          <div class="eyebrow">Direction / Dark Technical</div>
          <h1><strong>AI 全栈开发</strong><br>工程师的长期记录</h1>
          <p class="intro">这套更偏开发者气质，适合你想把博客做成“技术工作台”的感觉。不是赛博朋克那种花哨路线，而是更克制的深色技术感。</p>
          <div class="meta"><span>Dark UI</span><span>Technical</span><span>Focused</span></div>
          <div class="actions"><a href="#">进入文章</a><a href="#">查看标签</a><a href="#">GitHub</a></div>
        </section>
        <aside class="visual">
          <div class="terminal">
            <div class="terminal-line">$ role --current</div>
            <div class="terminal-line">AI / Frontend / Desktop</div>
            <div class="terminal-line">$ index --content</div>
            <div class="terminal-line">articles, archive, taxonomy, notes</div>
          </div>
          <img src="/public/img/hero-workspace-BzxyHKuJ.jpg" alt="Workspace">
          <div class="visual-note"><span>Workspace Capture</span><span>Human-scale tools</span></div>
        </aside>
      </main>
    </div>
  </body>
</html>
