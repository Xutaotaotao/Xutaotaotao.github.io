<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Redesign / Editorial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #f6f2eb;
        --text: #111318;
        --muted: #676058;
        --soft: #968b7f;
        --line: rgba(17, 19, 24, 0.12);
        --accent: #bb5d3f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: linear-gradient(180deg, #f8f5f0 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Inter", "Noto Sans SC", sans-serif;
      }
      .shell { width: min(1240px, calc(100% - 48px)); margin: 0 auto; padding: 28px 0 56px; }
      .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 22px; }
      .brand,.nav a,.eyebrow,.meta { font-family: "JetBrains Mono", monospace; }
      .brand { font-size: 16px; font-weight: 800; }
      .nav { display: flex; gap: 22px; }
      .nav a { color: var(--muted); font-size: 12px; font-weight: 800; text-decoration: none; text-transform: uppercase; }
      .hero { display: grid; grid-template-columns: minmax(0, 0.96fr) minmax(420px, 1.04fr); gap: 64px; align-items: start; min-height: calc(100vh - 140px); padding-top: 30px; }
      .copy { padding-top: 84px; max-width: 540px; }
      .eyebrow { color: var(--soft); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; }
      h1 { margin: 16px 0 0; font-family: "Noto Sans SC", sans-serif; letter-spacing: 0; }
      h1 span { display: block; }
      h1 .primary { max-width: 12ch; color: var(--text); font-size: clamp(28px, 3.1vw, 44px); font-weight: 700; line-height: 1.18; }
      h1 .secondary { margin-top: 10px; color: var(--accent); font-size: clamp(18px, 2vw, 28px); font-weight: 700; line-height: 1.28; }
      .intro { max-width: 400px; margin: 18px 0 0; color: var(--muted); font-size: 12px; line-height: 1.88; }
      .meta { display: flex; gap: 8px 14px; margin-top: 18px; color: var(--soft); font-size: 8px; text-transform: uppercase; flex-wrap: wrap; }
      .actions { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
      .actions a { display: inline-flex; min-height: 38px; align-items: center; padding: 0 13px; border: 1px solid var(--line); color: var(--text); text-decoration: none; font-size: 13px; }
      .actions a:first-child { background: var(--text); color: #fff; border-color: var(--text); }
      figure { margin: 0; padding: 24px; border: 1px solid var(--line); background: rgba(255,255,255,0.48); }
      img { display: block; width: 100%; aspect-ratio: 4 / 5; object-fit: cover; }
      figcaption { display: flex; justify-content: space-between; margin-top: 14px; color: var(--soft); font-family: "JetBrains Mono", monospace; font-size: 11px; text-transform: uppercase; }
      .pullquote { margin-top: 22px; max-width: 230px; padding-left: 12px; border-left: 2px solid var(--accent); color: var(--text); font-size: 11px; line-height: 1.78; }
      @media (max-width: 1024px) {
        .hero { grid-template-columns: 1fr; gap: 30px; }
        .copy { padding-top: 0; }
      }
      @media (max-width: 720px) {
        .shell { width: min(100% - 28px, 1240px); }
        .copy { padding-top: 0; }
        h1 .primary { font-size: 24px; line-height: 1.2; }
        h1 .secondary { margin-top: 8px; font-size: 16px; line-height: 1.3; }
        .intro { font-size: 12px; line-height: 1.8; }
        figure { padding: 12px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">XUXU BLOG</div>
        <nav class="nav">
          <a href="#">首页</a><a href="#">归档</a><a href="#">分类</a><a href="#">标签</a><a href="#">关于</a>
        </nav>
      </header>
      <main class="hero">
        <section class="copy">
          <div class="eyebrow">Direction / Editorial Magazine</div>
          <h1>
            <span class="primary">AI 全栈开发工程师</span>
            <span class="secondary">技术笔记与项目复盘</span>
          </h1>
          <p class="intro">我把 AI 应用、前端工程、桌面端产品和真实项目里的经验整理成文章。这个首页更像一本杂志的封面，先建立气质，再引导进入内容。</p>
          <div class="meta"><span>Editorial</span><span>Warm Neutral</span><span>Chinese-first</span></div>
          <div class="actions"><a href="#">进入归档</a><a href="#">关于我</a><a href="#">GitHub</a></div>
          <p class="pullquote">适合你想把博客做得更像“个人出版物”，而不是传统技术站点。</p>
        </section>
        <figure>
          <img src="/public/img/hero-workspace-BzxyHKuJ.jpg" alt="Workspace">
          <figcaption><span>Fig. 01</span><span>Quiet Desk / Natural Light</span></figcaption>
        </figure>
      </main>
    </div>
  </body>
</html>
