<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" fill="none"><rect width="1280" height="760" fill="#f8fafc"/>
    
    <text x="72" y="74" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Identifier validation error</text>
    <text x="72" y="110" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">A common first build issue is an invalid app identifier in tauri.conf.json.</text>
    <rect x="72" y="132" width="148" height="34" rx="17" fill="#dc262614"/><text x="146" y="154" fill="#dc2626" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Build error</text>
  
    <rect x="72" y="196" width="1136" height="494" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="72" y="196" width="1136" height="54" rx="28" fill="#eef2ff"/>
    <circle cx="108" cy="223" r="8" fill="#ef4444"/>
    <circle cx="132" cy="223" r="8" fill="#f59e0b"/>
    <circle cx="156" cy="223" r="8" fill="#10b981"/>
    <text x="190" y="231" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Editor + build log</text>
    <rect x="92" y="270" width="260" height="388" rx="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="112" y="314" fill="#dc2626" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">File</text>
    <text x="112" y="282" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">src-tauri/tauri.conf.json</text><text x="112" y="322" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22" >identifier</text><text x="112" y="362" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22" >build output</text>
    <rect x="388" y="270" width="790" height="184" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="420" y="302" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Example fix</text>
    <text x="420" y="302" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">&quot;identifier&quot;: &quot;com.xtool&quot;</text><text x="420" y="340" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Use a valid reverse-domain identifier for your project.</text>
    <rect x="388" y="474" width="790" height="164" rx="20" fill="#dc262612" stroke="#dc262633" stroke-width="2"/>
    <text x="420" y="508" fill="#dc2626" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Why the build fails</text>
    <text x="420" y="520" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• The packaging step validates the identifier format.</text><text x="420" y="554" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• Invalid values stop the bundle before artifacts are created.</text>
    <text x="72" y="718" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">This is one of the first packaging errors new Tauri projects often hit.</text>
  </svg>