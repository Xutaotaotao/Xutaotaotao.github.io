<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" fill="none"><rect width="1280" height="760" fill="#f8fafc"/>
    
    <text x="72" y="74" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">napi-rs project structure</text>
    <text x="72" y="110" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">A small addon project is enough to expose Rust functions back into Electron.</text>
    <rect x="72" y="132" width="148" height="34" rx="17" fill="#7c3aed14"/><text x="146" y="154" fill="#7c3aed" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Addon</text>
  
    
    <rect x="72" y="196" width="500" height="454" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="96" y="220" width="10" height="10" rx="5" fill="#7c3aed"/>
    <text x="120" y="238" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Files</text>
    <text x="100" y="288" fill="#475569" font-family="JetBrains Mono, monospace" font-size="22" >src/lib.rs</text><text x="100" y="322" fill="#475569" font-family="JetBrains Mono, monospace" font-size="22" >package.json</text><text x="100" y="356" fill="#475569" font-family="JetBrains Mono, monospace" font-size="22" >Cargo.toml</text><text x="100" y="390" fill="#475569" font-family="JetBrains Mono, monospace" font-size="22" >build.rs</text><text x="100" y="424" fill="#475569" font-family="JetBrains Mono, monospace" font-size="22" >npm/</text>
  
    
    <rect x="612" y="196" width="596" height="454" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="636" y="220" width="10" height="10" rx="5" fill="#7c3aed"/>
    <text x="660" y="238" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">What each part handles</text>
    <text x="640" y="288" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="24" >lib.rs exports #[napi] functions.</text><text x="640" y="326" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="24" >Cargo.toml declares Rust dependencies.</text><text x="640" y="364" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="24" >npm/ contains platform-specific .node outputs.</text><text x="640" y="402" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="24" >The package can be copied into Electron resources later.</text>
  
    <text x="72" y="706" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Keep the native module isolated so the desktop app can call it cleanly.</text>
  </svg>