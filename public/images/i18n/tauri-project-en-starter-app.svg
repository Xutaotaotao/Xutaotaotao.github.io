    <text x="420" y="520" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• The desktop window launches.</text><text x="420" y="554" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• Frontend assets load normally.</text><text x="420" y="588" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• The Rust backend compiles without setup errors.</text>
