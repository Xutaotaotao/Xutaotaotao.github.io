    <text x="420" y="302" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">The default window confirms that Rust + frontend wiring works.</text><text x="420" y="340" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Different templates show different starter content.</text>
