<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" fill="none"><rect width="1280" height="760" fill="#f8fafc"/>
    
    <text x="72" y="74" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Create a Tauri project from the CLI</text>
    <text x="72" y="110" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">The scaffold wizard asks for the app name, package, framework, and language choices.</text>
    <rect x="72" y="132" width="148" height="34" rx="17" fill="#0f766e14"/><text x="146" y="154" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Tauri</text><rect x="240" y="132" width="148" height="34" rx="17" fill="#0f766e14"/><text x="314" y="154" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">CLI</text>
  
    <rect x="72" y="210" width="600" height="420" rx="24" fill="#0f172a"/>
    <text x="110" y="262" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Terminal</text>
    <text x="110" y="300" fill="#e2e8f0" font-family="JetBrains Mono, monospace" font-size="22">$ pnpm create tauri-app</text><text x="110" y="336" fill="#e2e8f0" font-family="JetBrains Mono, monospace" font-size="22">$ Enter project name, package name, and UI framework</text><text x="110" y="372" fill="#e2e8f0" font-family="JetBrains Mono, monospace" font-size="22">$ Choose frontend language and package manager</text>
    <rect x="706" y="210" width="502" height="420" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="742" y="262" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Wizard result</text>
    <text x="760" y="300" fill="#475569" font-family="JetBrains Mono, monospace" font-size="20">Template ready</text><text x="760" y="334" fill="#475569" font-family="JetBrains Mono, monospace" font-size="20">Rust dependencies may install in VS Code</text><text x="760" y="368" fill="#475569" font-family="JetBrains Mono, monospace" font-size="20">Run the app from the project root next</text>
    <text x="72" y="706" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">This is the fastest way to get a clean Tauri starter project on disk.</text>
  </svg>