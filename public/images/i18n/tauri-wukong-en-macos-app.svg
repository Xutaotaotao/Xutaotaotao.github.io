    <text x="420" y="302" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Preview current image</text><text x="420" y="340" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Set wallpaper across desktops</text><text x="420" y="378" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Store downloaded image in the home directory</text>
    <rect x="388" y="474" width="790" height="164" rx="20" fill="#0f766e12" stroke="#0f766e33" stroke-width="2"/>
    <text x="420" y="508" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Platform note</text>
    <text x="420" y="520" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• Wallpaper changes use AppleScript on macOS.</text><text x="420" y="554" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• The UI can stay nearly identical to the Windows build.</text>
    <text x="72" y="718" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Cross-platform parity is one reason a small Tauri utility can be worth building.</text>
