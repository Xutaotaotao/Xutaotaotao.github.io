    <rect x="348" y="150" width="128" height="94" rx="18" fill="#ede9fe"/><text x="412" y="204" fill="#6d28d9" font-size="18" font-weight="700" text-anchor="middle">Cache</text>
    <rect x="498" y="150" width="128" height="94" rx="18" fill="#ffedd5"/><text x="562" y="204" fill="#c2410c" font-size="18" font-weight="700" text-anchor="middle">Node</text>
