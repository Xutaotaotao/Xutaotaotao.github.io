    <text x="420" y="302" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Optimization guide on device</text><text x="420" y="340" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Value: Enabled BypassPerfRequirement</text><text x="420" y="378" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Restart the browser again after saving the change.</text>
