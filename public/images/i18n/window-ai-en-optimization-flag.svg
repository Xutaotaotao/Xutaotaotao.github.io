    <text x="420" y="508" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Why this matters</text>
    <text x="420" y="520" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• The local model is delivered through the optimization guide path.</text><text x="420" y="554" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• Without it, window.ai may never become ready.</text>
    <text x="72" y="718" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">The AI runtime needs both the prompt flag and the local model path.</text>
