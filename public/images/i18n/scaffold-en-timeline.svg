  <text x="48" y="96" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="16">Project setup moved from manual folders to framework-specific CLIs and modern toolchains.</text>
  <g stroke="#cbd5e1" stroke-width="6" stroke-linecap="round">
    <path d="M92 226h736"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <circle cx="132" cy="226" r="12" fill="#1d4ed8"/>
    <text x="132" y="186" fill="#0f172a" font-size="16" font-weight="700" text-anchor="middle">Manual setup</text>
    <text x="132" y="258" fill="#475569" font-size="13" text-anchor="middle">Hand-written folders</text>

