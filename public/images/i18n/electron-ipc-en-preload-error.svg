    <text x="420" y="302" fill="#475569" font-family="JetBrains Mono, monospace" font-size="22">Error: Unable to load preload script</text><text x="420" y="340" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">The file must exist in dist/preload.</text><text x="420" y="378" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Point BrowserWindow preload to index.cjs.</text>
    <rect x="388" y="474" width="790" height="164" rx="20" fill="#dc262612" stroke="#dc262633" stroke-width="2"/>
    <text x="420" y="508" fill="#dc2626" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Fix path + build step</text>
    <text x="420" y="520" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• Add config/vite/preload.js.</text><text x="420" y="554" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• Run preload build inside scripts/dev.js.</text><text x="420" y="588" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">• Use ../preload/index.cjs in main/index.ts.</text>
    <text x="72" y="718" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Once preload is built, the renderer can use the bridge safely.</text>
