    <text x="112" y="282" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Unable to load preload script</text><text x="112" y="322" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22" >Renderer starts but bridge is missing</text><text x="112" y="362" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22" >IPC calls fail immediately</text>
    <rect x="388" y="270" width="790" height="184" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
