<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" fill="none">
  <rect width="920" height="360" rx="28" fill="#f8fafc"/>
  <text x="48" y="64" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Hot Module Replacement flow</text>
  <text x="48" y="96" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="16">Only the changed module is rebuilt and patched into the running app, keeping state when possible.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="54" y="156" width="184" height="120" rx="22" fill="#ffedd5"/>
    <text x="146" y="196" fill="#c2410c" font-size="22" font-weight="700" text-anchor="middle">Module change</text>
    <text x="146" y="228" fill="#0f172a" font-size="15" text-anchor="middle">A single file is edited</text>
    <text x="146" y="250" fill="#0f172a" font-size="15" text-anchor="middle">Graph marks it dirty</text>

    <rect x="368" y="156" width="184" height="120" rx="22" fill="#dbeafe"/>
    <text x="460" y="196" fill="#1d4ed8" font-size="22" font-weight="700" text-anchor="middle">Patch build</text>
    <text x="460" y="228" fill="#0f172a" font-size="15" text-anchor="middle">Only affected modules</text>
    <text x="460" y="250" fill="#0f172a" font-size="15" text-anchor="middle">are rebuilt and sent</text>

    <rect x="682" y="156" width="184" height="120" rx="22" fill="#dcfce7"/>
    <text x="774" y="196" fill="#15803d" font-size="22" font-weight="700" text-anchor="middle">Runtime swap</text>
    <text x="774" y="228" fill="#0f172a" font-size="15" text-anchor="middle">App replaces module</text>
    <text x="774" y="250" fill="#0f172a" font-size="15" text-anchor="middle">without full refresh</text>
  </g>
  <g stroke="#94a3b8" stroke-linecap="round" stroke-width="8">
    <path d="M248 216h100"/>
    <path d="M562 216h100"/>
  </g>
</svg>
