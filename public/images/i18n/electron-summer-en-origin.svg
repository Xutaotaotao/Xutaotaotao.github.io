      <text x="543" y="374" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Atom Shell</text>
      <text x="543" y="410" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Combine Chromium and Node.js</text><text x="543" y="444" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Use web tech for rich UI</text>
      <path d="M775 400H797L783 386M797 400L783 414" stroke="#0f766e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
