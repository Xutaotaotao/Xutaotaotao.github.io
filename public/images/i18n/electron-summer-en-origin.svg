      <text x="835" y="410" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Open the shell to others</text><text x="835" y="444" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Grow into an independent framework</text>
      
    
    <text x="640" y="620" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle">A concrete product need is what pushed the framework into existence.</text>
