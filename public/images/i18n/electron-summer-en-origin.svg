      <text x="251" y="410" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Build Atom once</text><text x="251" y="444" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Ship it on every desktop OS</text>
      <path d="M483 400H505L491 386M505 400L491 414" stroke="#0f766e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
